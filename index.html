<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phonics Play 🔤</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#F5F3FF;color:#2C2C2A;min-height:100vh}
.app-header{padding:12px 14px 8px;text-align:center;background:#3C3489;position:relative}
.app-title{font-family:'Fredoka One',cursive;font-size:24px;color:#fff;letter-spacing:1px}
.app-sub{font-size:11px;color:rgba(255,255,255,0.75);margin-top:2px}
.emoji-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.18);border:1.5px solid rgba(255,255,255,0.45);border-radius:20px;padding:5px 10px;font-size:11px;font-weight:800;color:#fff;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.emoji-toggle:hover{background:rgba(255,255,255,0.28)}
.emoji-toggle.hm{background:rgba(255,200,50,0.25);border-color:#EF9F27;color:#EF9F27}
.tdot{width:8px;height:8px;border-radius:50%;background:#fff;transition:background .2s;flex-shrink:0}
.emoji-toggle.hm .tdot{background:#EF9F27}
.nav-tabs{display:flex;background:#26215C}
.nav-tab{flex:1;padding:9px 2px;border:none;background:transparent;color:rgba(255,255,255,0.5);font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.nav-tab.active{color:#fff;border-bottom-color:#EF9F27}
.screen{display:none;padding:12px;max-width:640px;margin:0 auto}
.screen.active{display:block}
.mode-banner{background:#FAEEDA;border-radius:10px;padding:7px 12px;margin-bottom:10px;font-size:12px;font-weight:700;color:#633806;display:none;align-items:center;gap:6px}
.mode-banner.vis{display:flex}
.section-tabs{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.stab{padding:7px 12px;border-radius:20px;border:2px solid transparent;background:#fff;font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;cursor:pointer;transition:all .15s;color:#888;white-space:nowrap}
.stab.active{border-color:var(--sc,#534AB7);background:var(--sbg,#EEEDFE);color:var(--sc,#534AB7)}
.stab:hover{border-color:var(--sc,#534AB7)}
.sub-tabs{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.subtab{flex:1;min-width:40px;padding:7px 4px;border-radius:9px;border:2px solid transparent;background:#fff;font-family:'Fredoka One',cursive;font-size:15px;cursor:pointer;text-align:center;transition:all .15s;color:#888}
.subtab.active{border-color:var(--vc,#534AB7);background:var(--vbg,#EEEDFE);color:var(--vc,#534AB7)}
.subtab:hover{border-color:var(--vc,#534AB7)}
/* pos divider label */
.pos-divider{grid-column:1/-1;display:flex;align-items:center;gap:8px;margin:4px 0 2px}
.pos-divider-line{flex:1;height:1px;background:rgba(0,0,0,0.08)}
.pos-divider-label{font-size:10px;font-weight:800;padding:2px 10px;border-radius:10px;white-space:nowrap}
.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:9px}
.word-card{background:#fff;border-radius:13px;border:2px solid rgba(0,0,0,0.08);padding:11px 8px;cursor:pointer;transition:all .15s;text-align:center;user-select:none}
.word-card:hover{transform:translateY(-2px);border-color:var(--vc,#534AB7)}
.word-card:active{transform:scale(0.95)}
.word-card.playing{border-color:var(--vc,#534AB7);background:var(--vbg,#EEEDFE);animation:pop .35s ease}
@keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.07)}100%{transform:scale(1)}}
.wc-emoji{font-size:26px;margin-bottom:3px;display:block;transition:all .25s}
.wc-emoji.hidden{font-size:0;height:0;overflow:hidden;opacity:0;margin:0}
.wc-word{font-family:'Fredoka One',cursive;font-size:19px;margin-bottom:2px;line-height:1.2}
.wc-ipa{font-size:10px;color:#bbb;margin-bottom:3px;font-style:italic}
.wc-structure{display:flex;justify-content:center;gap:2px;margin-top:5px;flex-wrap:wrap}
.wc-c{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 3px;border-radius:5px;font-size:11px;font-weight:800}
.wc-cons{background:#F1EFE8;color:#5F5E5A}
.wc-vow{background:var(--vbg,#EEEDFE);color:var(--vc,#534AB7)}
.qhdr{background:#fff;border-radius:13px;border:1px solid rgba(0,0,0,0.08);padding:11px 13px;margin-bottom:11px}
.qmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.qprog-lbl{font-size:12px;color:#888;font-weight:800}
.qscore{background:#EAF3DE;color:#27500A;border-radius:10px;padding:3px 9px;font-size:12px;font-weight:800}
.prog-bar{height:6px;background:#F1EFE8;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:#534AB7;border-radius:3px;transition:width .4s ease}
.qcard{background:#fff;border-radius:16px;border:1px solid rgba(0,0,0,0.08);padding:20px 14px;text-align:center;margin-bottom:11px}
.q-instr{font-size:12px;color:#888;margin-bottom:12px;font-weight:700}
.play-btn{width:64px;height:64px;border-radius:50%;background:#534AB7;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto 9px;font-size:24px;color:#fff;transition:all .2s}
.play-btn:hover{opacity:.85;transform:scale(1.04)}
.play-btn:active{transform:scale(.93)}
.play-btn.playing{animation:popbtn .5s ease}
@keyframes popbtn{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
.q-hint{font-size:11px;color:#bbb}
.q-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:9px}
.opt-btn{background:#fff;border:2.5px solid rgba(0,0,0,0.12);border-radius:12px;padding:11px 6px;font-family:'Fredoka One',cursive;color:#534AB7;cursor:pointer;transition:all .15s;text-align:center;line-height:1.3}
.opt-btn:hover:not(:disabled){border-color:#534AB7;background:#EEEDFE;transform:translateY(-1px)}
.opt-btn.correct{background:#EAF3DE;border-color:#639922;color:#27500A}
.opt-btn.wrong{background:#FCEBEB;border-color:#A32D2D;color:#791F1F}
.opt-btn:disabled{cursor:default}
.opt-emoji{display:block;font-size:22px;margin-bottom:2px;transition:all .2s}
.opt-emoji.hidden{font-size:0;height:0;overflow:hidden;opacity:0;margin:0}
.opt-word{display:block;font-size:15px}
.fb{text-align:center;padding:9px 11px;border-radius:10px;font-size:13px;font-weight:800;display:none;margin-bottom:9px}
.fb.correct{background:#EAF3DE;color:#27500A;display:block}
.fb.wrong{background:#FCEBEB;color:#791F1F;display:block}
.next-btn{width:100%;padding:12px;background:#534AB7;color:#fff;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;display:none;transition:all .2s}
.next-btn.vis{display:block}
.next-btn:hover{opacity:.88;transform:translateY(-1px)}
.start-wrap{text-align:center;padding:16px 10px}
.start-title{font-family:'Fredoka One',cursive;font-size:21px;color:#534AB7;margin-bottom:5px}
.start-desc{font-size:12px;color:#888;margin-bottom:16px;line-height:1.6}
.qsec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:16px}
.qsec-card{background:#fff;border:2px solid rgba(0,0,0,0.08);border-radius:12px;padding:11px 5px;cursor:pointer;transition:all .15s;text-align:center}
.qsec-card:hover{border-color:#534AB7}
.qsc-icon{font-size:18px;margin-bottom:3px}
.qsc-lbl{font-size:10px;font-weight:800;color:#2C2C2A;line-height:1.3}
.qsc-cnt{font-size:9px;color:#888;margin-top:2px}
.start-btn{width:100%;padding:14px;background:#534AB7;color:#fff;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s}
.start-btn:hover{opacity:.88;transform:translateY(-1px)}
.res-wrap{text-align:center;padding:16px 12px}
.res-emoji-big{font-size:48px;margin-bottom:8px}
.res-title{font-family:'Fredoka One',cursive;font-size:22px;color:#534AB7;margin-bottom:4px}
.res-big{font-family:'Fredoka One',cursive;font-size:44px;margin:5px 0}
.res-meta{font-size:12px;color:#888;margin-bottom:16px}
.bdown{background:#fff;border-radius:13px;border:1px solid rgba(0,0,0,0.08);padding:13px;margin-bottom:12px;text-align:left}
.bd-title{font-size:11px;font-weight:800;color:#888;letter-spacing:.5px;text-transform:uppercase;margin-bottom:9px}
.bd-item{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid rgba(0,0,0,0.06)}
.bd-item:last-child{border-bottom:none}
.bd-word{font-family:'Fredoka One',cursive;font-size:13px;color:#534AB7;width:58px;flex-shrink:0}
.bd-bwrap{flex:1;height:6px;background:#F1EFE8;border-radius:3px;overflow:hidden}
.bd-bar{height:100%;border-radius:3px}
.bd-bar.good{background:#639922}.bd-bar.ok{background:#BA7517}.bd-bar.bad{background:#A32D2D}
.bd-lbl{font-size:11px;font-weight:800;width:28px;text-align:right;flex-shrink:0;color:#888}
.bd-ico{font-size:12px;width:16px;flex-shrink:0}
.rev-title{font-size:12px;font-weight:800;color:#A32D2D;margin-bottom:7px}
.rev-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.rev-chip{background:#FCEBEB;color:#791F1F;border-radius:16px;padding:3px 10px;font-size:12px;font-weight:700;font-family:'Fredoka One',cursive}
.res-actions{display:flex;gap:8px}
.retry-btn{flex:1;padding:12px;background:#534AB7;color:#fff;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s}
.rev-btn{flex:1;padding:12px;background:#FCEBEB;color:#791F1F;border:2px solid #F09595;border-radius:12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s}
.retry-btn:hover,.rev-btn:hover{opacity:.85;transform:translateY(-1px)}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">🔤 Phonics Play</div>
  <div class="app-sub">파닉스 종합 학습앱</div>
  <button class="emoji-toggle" id="emoji-toggle" onclick="toggleEmoji()">
    <span class="tdot" id="tdot"></span>
    <span id="tlabel">삽화 숨기기</span>
  </button>
</div>
<div class="nav-tabs">
  <button class="nav-tab active" onclick="switchTab('learn')">📖 배우기</button>
  <button class="nav-tab" onclick="switchTab('quiz')">🎯 퀴즈</button>
</div>

<div id="t-learn" class="screen active">
  <div class="mode-banner" id="learn-banner">🙈 삽화 숨김 모드 — 문자만 보고 읽어봐요!</div>
  <div class="section-tabs" id="stabs"></div>
  <div class="sub-tabs" id="subtabs"></div>
  <div class="word-grid" id="word-grid"></div>
</div>

<div id="t-quiz" class="screen">
  <div id="q-start">
    <div class="start-wrap">
      <div class="start-title">퀴즈 시작!</div>
      <div class="start-desc">소리를 듣고 알맞은 단어를 골라봐요.<br>어떤 코너를 풀까요?</div>
      <div class="qsec-grid" id="qsec-grid"></div>
      <button class="start-btn" onclick="startQuiz()">시작하기 ▶</button>
    </div>
  </div>
  <div id="q-active" style="display:none">
    <div class="mode-banner" id="quiz-banner">🙈 삽화 숨김 모드 — 문자만 보고 골라봐요!</div>
    <div class="qhdr">
      <div class="qmeta">
        <span class="qprog-lbl" id="qp-lbl">1 / 10</span>
        <span class="qscore" id="qp-score">✓ 0</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="qp-fill" style="width:10%"></div></div>
    </div>
    <div class="qcard">
      <div class="q-instr">소리를 듣고 알맞은 단어를 골라요!</div>
      <button class="play-btn" id="play-btn" onclick="playQSound()">▶</button>
      <div class="q-hint" id="q-hint">버튼을 누르면 소리가 나요</div>
    </div>
    <div class="q-opts" id="q-opts"></div>
    <div class="fb" id="fb-msg"></div>
    <button class="next-btn" id="next-btn" onclick="nextQ()">다음 문제 →</button>
  </div>
  <div id="q-result" style="display:none"></div>
</div>

<script>

// ══════════════════════════════════════════════════════════

function toggleEmoji(){
  emojiHidden=!emojiHidden;
  const btn=document.getElementById('emoji-toggle');
  const lbl=document.getElementById('tlabel');
  const dot=document.getElementById('tdot');
  if(emojiHidden){
    btn.classList.add('hm'); lbl.textContent='삽화 보이기'; dot.style.background='#EF9F27';
    document.getElementById('learn-banner').classList.add('vis');
    document.getElementById('quiz-banner').classList.add('vis');
  } else {
    btn.classList.remove('hm'); lbl.textContent='삽화 숨기기'; dot.style.background='#fff';
    document.getElementById('learn-banner').classList.remove('vis');
    document.getElementById('quiz-banner').classList.remove('vis');
  }
  document.querySelectorAll('.wc-emoji').forEach(el=>el.classList.toggle('hidden',emojiHidden));
  document.querySelectorAll('.opt-emoji').forEach(el=>el.classList.toggle('hidden',emojiHidden));
}

function renderSTabs(){
  document.getElementById('stabs').innerHTML=SECTIONS.map(s=>`
    <button class="stab${s.id===curSec?' active':''}"
      style="--sc:${s.color};--sbg:${s.bg}"
      onclick="setLearnSec('${s.id}')">${s.icon} ${s.label}</button>`).join('');
}

function renderSubTabs(){
  const keys=Object.keys(SECTION_DATA[curSec]);
  document.getElementById('subtabs').innerHTML=keys.map(k=>`
    <button class="subtab${k===curSub?' active':''}"
      style="--vc:${sc(k)};--vbg:${sbg(k)}"
      onclick="setLearnSub('${k}')">${SUB_LABELS[k]||k}</button>`).join('');
}

  const isDigcon = curSec === 'digcon';

  let html = '';

    const initial = words.filter(w=>w.pos==='i');

      html += `<div class="pos-divider" style="grid-column:1/-1">

        <div class="pos-divider-line"></div>
      </div>`;
      html += initial.map(w=>makeCard(w,c,b)).join('');
    }
    if(final_.length){
      html += `<div class="pos-divider" style="grid-column:1/-1">
        <div class="pos-divider-line"></div>
        <div class="pos-divider-label" style="background:#E1F5EE;color:#0F6E56">뒤에 붙는 소리 (어말)</div>
        <div class="pos-divider-line"></div>
      </div>`;
      html += final_.map(w=>makeCard(w,c,b)).join('');
    }
  } else {
    html = words.map(w=>makeCard(w,c,b)).join('');
  }

  document.getElementById('word-grid').innerHTML = html;
}

function makeCard(w, c, b){
  const hl = highlightWord(w.w, curSub, c);
  const struct = buildStruct(w.w, curSub, c, b);
  return `<div class="word-card" style="--vc:${c};--vbg:${b}" onclick="playWord(this,'${w.w}')">
    <div class="wc-emoji${emojiHidden?' hidden':''}">${w.e}</div>
    <div class="wc-word">${hl}</div>
    <div class="wc-ipa">/${w.p}/</div>
    ${struct}
  </div>`;
}

function highlightWord(word, sub, c){
  if(curSec==='vce'){
    const v=sub[0];
    return word.replace(new RegExp(v,'i'),`<span style="color:${c};font-weight:900">${v}</span>`);
  }
  const pat=sub.replace('_e','');
  const re=new RegExp(pat,'i');
  return word.replace(re,m=>`<span style="color:${c};font-weight:900">${m}</span>`);
}

function buildStruct(word, sub, c, b){
  if(curSec==='cvc'&&sub.length===1){
    const vi=word.indexOf(sub);
    if(vi<0) return '';
    const pre=word.slice(0,vi),post=word.slice(vi+1);
    const mkc=(ch,cls)=>`<span class="wc-c ${cls}">${ch}</span>`;
    return `<div class="wc-structure">${[...pre].map(ch=>mkc(ch,'wc-cons')).join('')}${mkc(sub,'wc-vow')}${[...post].map(ch=>mkc(ch,'wc-cons')).join('')}</div>`;
  }
  const dispPat=sub.includes('_')?sub.replace('_',' '):sub;
  return `<div class="wc-structure"><span class="wc-c wc-vow" style="background:${b};color:${c};width:auto;padding:0 5px;min-width:28px">${dispPat}</span></div>`;
}

function setLearnSec(sid){
  curSec=sid;
  curSub=Object.keys(SECTION_DATA[sid])[0];
  document.documentElement.style.setProperty('--vc',sc(curSub));
  document.documentElement.style.setProperty('--vbg',sbg(curSub));
  renderSTabs(); renderSubTabs(); renderWordGrid();
}

function setLearnSub(k){
  curSub=k;
  document.documentElement.style.setProperty('--vc',sc(k));
  document.documentElement.style.setProperty('--vbg',sbg(k));
  renderSubTabs(); renderWordGrid();
}

function playWord(el,word){
  el.classList.add('playing');
  setTimeout(()=>el.classList.remove('playing'),500);
  speak(word);
}

// ══════════════════════════════════════════════════════════
//  QUIZ
// ══════════════════════════════════════════════════════════
const QUIZ_SECTIONS = [
  {id:'cvc',    label:'단모음 CVC', icon:'🔤', cnt:'50'},
  {id:'digcon', label:'복자음',     icon:'🔗', cnt:'40'},
  {id:'vr',     label:'모음+R',    icon:'🌀', cnt:'50'},
  {id:'vce',    label:'장모음 e',  icon:'⚡', cnt:'50'},
  {id:'vowel',  label:'이중모음',  icon:'🎵', cnt:'120'},
  {id:'blend',  label:'이중자음',  icon:'🔀', cnt:'80'},
  {id:'all',    label:'전체 섞기', icon:'⭐', cnt:'all'},
  {id:'cvc_a',  label:'CVC · A',  icon:'🔴', cnt:'10'},
  {id:'cvc_e',  label:'CVC · E',  icon:'🔵', cnt:'10'},
  {id:'cvc_i',  label:'CVC · I',  icon:'🩷', cnt:'10'},
  {id:'cvc_o',  label:'CVC · O',  icon:'🟢', cnt:'10'},
  {id:'cvc_u',  label:'CVC · U',  icon:'🟠', cnt:'10'},
  {id:'digcon_ch',label:'복자음 ch',icon:'🔵',cnt:'10'},
  {id:'digcon_sh',label:'복자음 sh',icon:'🟢',cnt:'10'},
  {id:'digcon_th',label:'복자음 th',icon:'🟣',cnt:'10'},
  {id:'digcon_ck',label:'복자음 ck',icon:'🟤',cnt:'10'},
  {id:'vowel_ai',label:'이중 ai',  icon:'🌧️',cnt:'10'},
  {id:'vowel_ee',label:'이중 ee',  icon:'🌿',cnt:'10'},
  {id:'vowel_oa',label:'이중 oa',  icon:'⛵',cnt:'10'},
  {id:'vowel_ou',label:'이중 ou',  icon:'☁️',cnt:'10'},
];

function getPoolForQSec(sid){
  if(sid==='all')
    return Object.values(SECTION_DATA).flatMap(sec=>
      Object.entries(sec).flatMap(([k,ws])=>ws.map(w=>({...w,_sub:k}))));
  if(sid.startsWith('cvc_')){const s=sid.slice(4);return(CVC_DATA[s]||[]).map(w=>({...w,_sub:s}))}
  if(sid.startsWith('digcon_')){const s=sid.slice(7);return(DIGCON_DATA[s]||[]).map(w=>({...w,_sub:s}))}
  if(sid.startsWith('vowel_')){const s=sid.slice(6);return(VOWEL_DATA[s]||[]).map(w=>({...w,_sub:s}))}
  const data=SECTION_DATA[sid];
  if(!data) return [];
  return Object.entries(data).flatMap(([k,ws])=>ws.map(w=>({...w,_sub:k})));
}

function renderQSecs(){
  document.getElementById('qsec-grid').innerHTML=QUIZ_SECTIONS.map(s=>{
    const isSel=quizSec===s.id;
    const secInfo=SECTIONS.find(x=>x.id===s.id)||SECTIONS.find(x=>s.id.startsWith(x.id))||{color:'#534AB7',bg:'#EEEDFE'};
    const c=secInfo.color,bk=secInfo.bg;
    return `<div class="qsec-card" style="${isSel?`border-color:${c};background:${bk}`:''}" onclick="selQSec(this,'${s.id}','${c}','${bk}')">
      <div class="qsc-icon">${s.icon}</div>
      <div class="qsc-lbl" style="color:${isSel?c:'#2C2C2A'}">${s.label}</div>
      <div class="qsc-cnt">${s.cnt==='all'?'전체':s.cnt+'개'}</div>
    </div>`;
  }).join('');
}

function selQSec(el,id,c,bk){
  quizSec=id;
  document.querySelectorAll('.qsec-card').forEach(x=>{
    x.style.borderColor='';x.style.background='';
    x.querySelector('.qsc-lbl').style.color='#2C2C2A';
  });
  el.style.borderColor=c;el.style.background=bk;
  el.querySelector('.qsc-lbl').style.color=c;
}

function shuffle(a){return[...a].sort(()=>Math.random()-.5)}

function startQuiz(){
  const pool=getPoolForQSec(quizSec);
  qQs=shuffle(pool).slice(0,Math.min(10,pool.length));
  qIdx=0;qScore=0;qResults=[];qAnswered=false;
  document.getElementById('q-start').style.display='none';
  document.getElementById('q-active').style.display='block';
  document.getElementById('q-result').style.display='none';
  renderQ();
}

function renderQ(){
  const q=qQs[qIdx],total=qQs.length;
  document.getElementById('qp-lbl').textContent=`${qIdx+1} / ${total}`;
  document.getElementById('qp-score').textContent=`✓ ${qScore}`;
  document.getElementById('qp-fill').style.width=`${Math.round((qIdx/total)*100+10)}%`;
  document.getElementById('fb-msg').className='fb';
  document.getElementById('next-btn').className='next-btn';
  qAnswered=false;
  const pool=getPoolForQSec(quizSec);
  const others=shuffle(pool.filter(x=>x.w!==q.w)).slice(0,3);
  const opts=shuffle([q,...others]);
  document.getElementById('q-opts').innerHTML=opts.map(o=>`
    <button class="opt-btn" onclick="checkAns(this,'${o.w}','${q.w}')">
      <span class="opt-emoji${emojiHidden?' hidden':''}">${o.e}</span>
      <span class="opt-word">${o.w}</span>
    </button>`).join('');
  document.getElementById('play-btn').className='play-btn';
  document.getElementById('q-hint').textContent='버튼을 누르면 소리가 나요';
  setTimeout(()=>playQSound(),350);
}

function playQSound(){
  if(!qQs[qIdx]) return;
  document.getElementById('play-btn').classList.add('playing');
  setTimeout(()=>document.getElementById('play-btn').classList.remove('playing'),500);
  speak(qQs[qIdx].w,0.78);
  document.getElementById('q-hint').textContent='다시 들으려면 버튼을 눌러요';
}

function checkAns(btn,chosen,correct){
  if(qAnswered)return;
  qAnswered=true;
  const q=qQs[qIdx],ok=chosen===correct;
  if(ok)qScore++;
  document.querySelectorAll('.opt-btn').forEach(b=>{
    const bw=b.querySelector('.opt-word').textContent;
    if(bw===correct)b.classList.add('correct');
    else if(bw===chosen&&!ok)b.classList.add('wrong');
    b.disabled=true;
  });
  const fb=document.getElementById('fb-msg');
  if(ok){fb.className='fb correct';fb.textContent=['✨ 정답이에요!','🎉 잘했어요!','⭐ 맞았어요!'][Math.floor(Math.random()*3)]}
  else{fb.className='fb wrong';fb.textContent=`❌ 틀렸어요. 정답은 "${correct}" 이에요!`}
  qResults.push({word:q.w,emoji:q.e,sub:q._sub,correct:ok});
  document.getElementById('next-btn').className='next-btn vis';
}

function nextQ(){qIdx++;qIdx>=qQs.length?showResult():renderQ()}

function showResult(){
  document.getElementById('q-active').style.display='none';
  const re=document.getElementById('q-result');re.style.display='block';
  const total=qQs.length,pct=Math.round((qScore/total)*100);
  const emoji=pct>=80?'🏆':pct>=60?'👍':'💪';
  const msg=pct>=80?'훌륭해요!':pct>=60?'잘했어요!':'더 연습해봐요!';
  const wrong=qResults.filter(r=>!r.correct);
  const bySub=qResults.reduce((acc,r)=>{const k=r.sub||'?';if(!acc[k])acc[k]={c:0,t:0};acc[k].t++;if(r.correct)acc[k].c++;return acc},{});
  const bdHtml=Object.entries(bySub).map(([k,v])=>{
    const pp=Math.round((v.c/v.t)*100);
    const cls=pp>=100?'good':pp>=50?'ok':'bad';
    const ico=pp>=100?'✅':pp>=50?'⚠️':'❌';
    return `<div class="bd-item"><div class="bd-word">${SUB_LABELS[k]||k}</div><div class="bd-bwrap"><div class="bd-bar ${cls}" style="width:${pp}%"></div></div><div class="bd-lbl">${v.c}/${v.t}</div><div class="bd-ico">${ico}</div></div>`;
  }).join('');
  re.innerHTML=`<div class="res-wrap">
    <div class="res-emoji-big">${emoji}</div>
    <div class="res-title">${msg}</div>
    <div class="res-big" style="color:${pct>=80?'#27500A':pct>=60?'#633806':'#791F1F'}">${qScore}/${total}</div>
    <div class="res-meta">정답률 ${pct}%</div>
    <div class="bdown"><div class="bd-title">패턴별 결과</div>${bdHtml}</div>
    ${wrong.length>0?`<div class="bdown"><div class="rev-title">⚠️ 복습이 필요한 단어</div><div class="rev-chips">${wrong.map(r=>`<span class="rev-chip">${r.emoji} ${r.word}</span>`).join('')}</div><div style="font-size:11px;color:#888">배우기 탭에서 다시 확인해봐요!</div></div>`:''}
    <div class="res-actions">
      <button class="retry-btn" onclick="restartQ()">다시 풀기 🔄</button>
      ${wrong.length>0?`<button class="rev-btn" onclick="switchTab('learn')">배우기로 돌아가기 📖</button>`:''}
    </div>
  </div>`;
}

function restartQ(){
  document.getElementById('q-result').style.display='none';
  document.getElementById('q-start').style.display='block';
  renderQSecs();
}

// ══════════════════════════════════════════════════════════
//  SHARED
// ══════════════════════════════════════════════════════════
function switchTab(t){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('t-'+t).classList.add('active');
  document.querySelectorAll('.nav-tab')[t==='learn'?0:1].classList.add('active');
  if(t==='quiz')renderQSecs();
}

function speak(txt,rate=0.82){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='en-US';u.rate=rate;u.pitch=1.05;
  const vs=speechSynthesis.getVoices();
  const v=vs.find(x=>x.lang==='en-US'&&x.name.includes('Female'))||vs.find(x=>x.lang==='en-US')||vs.find(x=>x.lang.startsWith('en'));
  if(v)u.voice=v;
  speechSynthesis.speak(u);
}

// ══════════════════════════════════════════════════════════
speechSynthesis.onvoiceschanged=()=>{};
setLearnSec('cvc');
renderSTabs();
</script>
